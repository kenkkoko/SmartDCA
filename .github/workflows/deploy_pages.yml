name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Inject Supabase Config
        run: |
          sed -i 's|__SUPABASE_URL_PLACEHOLDER__|${{ secrets.SUPABASE_URL }}|g' index.html
          sed -i 's|__SUPABASE_ANON_KEY_PLACEHOLDER__|${{ secrets.SUPABASE_ANON_KEY }}|g' index.html
      - name: Verify Injection
        run: |
          if grep -q "__SUPABASE_URL_PLACEHOLDER__" index.html; then
            echo "::error::SUPABASE_URL placeholder not replaced! Add SUPABASE_URL to repo secrets."
            exit 1
          fi
          if grep -q "__SUPABASE_ANON_KEY_PLACEHOLDER__" index.html; then
            echo "::error::SUPABASE_ANON_KEY placeholder not replaced! Add SUPABASE_ANON_KEY to repo secrets."
            exit 1
          fi
          echo "Supabase config injection verified."
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
